name: claude-launcher
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.dashan.claude-launcher
    MACOSX_DEPLOYMENT_TARGET: '14.0'
    SWIFT_VERSION: '5.10'
    MARKETING_VERSION: 1.0.6
    CURRENT_PROJECT_VERSION: 7
    GENERATE_INFOPLIST_FILE: YES
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.14.0
targets:
  ClaudeLauncher:
    type: application
    platform: macOS
    sources:
      - path: ClaudeLauncherApp
    dependencies:
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCore
    settings:
      base:
        PRODUCT_NAME: ClaudeLauncher
        INFOPLIST_KEY_NSHumanReadableCopyright: ''
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - ClaudeLauncherTests
  ClaudeLauncherTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeLauncherTests
    dependencies:
      - target: ClaudeLauncher
